groups:
  - name: flask-app-alerts
    rules:
      - alert: High5xxErrorRate
        expr: rate(http_requests_total{status=~"5.."}[1m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High rate of 5xx errors"
          description: "More than 1 error per second detected in the last minute."