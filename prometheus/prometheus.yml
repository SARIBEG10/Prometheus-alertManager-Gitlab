global:
  scrape_interval: 15s
  evaluation_interval: 15s
  
scrape_configs:
  - job_name: 'flask-app' # this job name mentioned in alerts.yml rule config name under the groups => flask-app-alerts
    static_configs:
      - targets: ['web:5000'] # find application by service name defined in docker-compose.yml and service port
rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093'] # find alertmanager service by name defined in docker-compose.yml and service port
